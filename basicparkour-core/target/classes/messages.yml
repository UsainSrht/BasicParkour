# ─────────────────────────────────────────────────────────────────────────────
# Basic Parkour Plugin — Messages Configuration
# All messages use MiniMessage syntax: https://docs.advntr.dev/minimessage/
# ─────────────────────────────────────────────────────────────────────────────
#
# Available placeholders per message (where applicable):
#   {course}      → Course display name (MiniMessage component)
#   {time}        → Formatted timer string, e.g. "02:34.567"
#   {checkpoint}  → Current checkpoint number (1-based)
#   {total}       → Total checkpoints in the course
#   {player}      → Player name
#   {rank}        → Leaderboard rank
# ─────────────────────────────────────────────────────────────────────────────

messages:

  # Displayed when a player starts a session (action bar)
  course-start: "<gradient:green:aqua>▶ <bold>Basic Parkour</bold> started! Good luck!</gradient>"

  # Displayed when a checkpoint is reached (action bar)
  checkpoint-reach: "<green>✔ Checkpoint <white>{checkpoint}</white> reached! <dark_gray>[<white>{time}</white>]</dark_gray>"

  # Displayed when the course is completed (chat message)
  course-complete: "<gold><bold>🏁 Course complete!</bold></gold> <yellow>Time: <white>{time}</white></yellow>"

  # Displayed when the session is failed (action bar)
  session-fail: "<red>✗ Failed! <gray>Respawning at last checkpoint…</gray></red>"

  # Displayed in addition to course-complete when a personal best is set
  personal-best: "<aqua>🏆 <bold>New personal best!</bold> <white>{time}</white></aqua>"

  # Action bar timer display (shown every tick during a session)
  timer-display: "<gray>⏱ <white>{time}</white>  <dark_gray>CP: <white>{checkpoint}</white>/<white>{total}</white></dark_gray>"

  # Leaderboard header (chat)
  leaderboard-header: "<gold>━━━ <bold>Leaderboard — {course}</bold> ━━━</gold>"

  # Each leaderboard row (chat)
  leaderboard-entry: "  <gray>{rank}. <white>{player}</white> — <yellow>{time}</yellow></gray>"

  # Error: course not found
  no-course: "<red>No course found with that ID.</red>"

  # Error: player already in a session
  already-in-session: "<yellow>You are already running a course! Use <white>/basicparkour leave</white> to exit.</yellow>"
