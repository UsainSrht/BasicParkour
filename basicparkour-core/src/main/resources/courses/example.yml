# ─────────────────────────────────────────────────────────────────────────────
# Basic Parkour Course Definition — Example Course
# Place individual course files in plugins/BasicParkour/courses/
# ─────────────────────────────────────────────────────────────────────────────

# Unique identifier for this course (case-insensitive, used in commands and DB)
id: example

# MiniMessage-formatted display name
display-name: "<gradient:yellow:gold><bold>Example Course</bold></gradient>"

# The Bukkit world name this course exists in
world: world

# ─── Start region ─────────────────────────────────────────────────────────────
# When a player walks into this AABB, their session automatically begins.
start-region:
  min:
    x: 0.0
    y: 64.0
    z: 0.0
  max:
    x: 4.0
    y: 68.0
    z: 4.0

# ─── End region ───────────────────────────────────────────────────────────────
# When a player walks into this AABB during an active session, the course completes.
end-region:
  min:
    x: 100.0
    y: 64.0
    z: 0.0
  max:
    x: 104.0
    y: 68.0
    z: 4.0

# ─── Checkpoints ──────────────────────────────────────────────────────────────
# Must be reached in order (index 0 first).
# "location" is where the player is teleported on respawn (yaw/pitch preserved).
# "region" is the AABB that triggers the checkpoint.
checkpoints:
  - location:
      x: 20.5
      y: 65.0
      z: 2.5
      yaw: 90.0
      pitch: 0.0
    region:
      min:
        x: 18.0
        y: 64.0
        z: 0.0
      max:
        x: 22.0
        y: 68.0
        z: 4.0

  - location:
      x: 50.5
      y: 65.0
      z: 2.5
      yaw: 90.0
      pitch: 0.0
    region:
      min:
        x: 48.0
        y: 64.0
        z: 0.0
      max:
        x: 52.0
        y: 68.0
        z: 4.0

  - location:
      x: 75.5
      y: 65.0
      z: 2.5
      yaw: 90.0
      pitch: 0.0
    region:
      min:
        x: 73.0
        y: 64.0
        z: 0.0
      max:
        x: 77.0
        y: 68.0
        z: 4.0

# ─── Block modifier overrides ─────────────────────────────────────────────────
# These override the global modifier registry for this specific course.
# "block" is the Bukkit Material name.
# "type" maps to a built-in modifier key (jump_pad | boost | kill)
#   or a NamespacedKey from a third-party modifier plugin.
modifiers:
  - block: SLIME_BLOCK
    type: jump_pad
    # strength: 1.2   (future: course-specific modifier parameters via custom BlockModifier)

  - block: BLUE_CONCRETE
    type: boost

  - block: RED_CONCRETE
    type: kill

  - block: MAGENTA_CONCRETE
    type: kill

# ─── Time limit ───────────────────────────────────────────────────────────────
# Optional. Remove or set to -1 to disable.
# time-limit-seconds: 300

# ─── Rewards ──────────────────────────────────────────────────────────────────
# Console commands run when a player completes this course.
# {player} is replaced with the player's name.
rewards:
  - "give {player} diamond 1"
  - "broadcast &6{player} &ecompleted the Example Course!"
