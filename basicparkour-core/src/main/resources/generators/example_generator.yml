# ──────────────────────────────────────────────────────────────────────────────
# BasicParkour — Example Generator Template
# ──────────────────────────────────────────────────────────────────────────────
# This file defines a single generator template. Copy and rename it to create
# additional templates (e.g. nether_hard.yml, ocean_easy.yml).
#
# REQUIRED fields are marked with [REQ].
# OPTIONAL fields show their default value in a comment.

# ── Identity ──────────────────────────────────────────────────────────────────
id: "example_generated"            # [REQ] Unique template ID (used in commands)
display-name: "<gradient:aqua:blue>Generated Parkour</gradient>"

# ── Difficulty ────────────────────────────────────────────────────────────────
# Options: EASY | MEDIUM | HARD | EXPERT
# Each difficulty has built-in gap/height defaults — override them below if needed.
difficulty: MEDIUM

# ── Theme (block palettes) ────────────────────────────────────────────────────
theme:
  name: "Forest"
  platform-materials:
    - OAK_PLANKS
    - BIRCH_PLANKS
    - JUNGLE_PLANKS
  accent-materials:
    - MOSSY_COBBLESTONE
    - COBBLESTONE
  obstacle-materials:
    - OAK_SLAB
    - OAK_TRAPDOOR

# ── Length ────────────────────────────────────────────────────────────────────
# Options: FIXED | INFINITE
length-type: FIXED
fixed-length: 30          # Number of platforms (ignored for INFINITE)

# ── Block mode ────────────────────────────────────────────────────────────────
# FULL_UPFRONT  — Place all blocks before the run starts, remove all on end.
# SLIDING_WINDOW — Generate ahead, remove behind as the player moves.
block-mode: FULL_UPFRONT
sliding-window-ahead: 15  # How many platforms to keep visible ahead (SLIDING_WINDOW only)

# ── Cleanup ───────────────────────────────────────────────────────────────────
# How many seconds to wait after the session ends before removing placed blocks.
cleanup-delay-seconds: 30

# ── Entry mode ────────────────────────────────────────────────────────────────
# DEDICATED_WORLD — Placed at a random non-overlapping slot in a dedicated world.
# MARKER          — Placed at an admin-defined marker (use /basicparkour setentry).
entry-mode: DEDICATED_WORLD
dedicated-world: "world"      # Name of the world to generate in
dedicated-world-radius: 100000 # Max distance from 0,0 for slot placement

# ── Session sharing ───────────────────────────────────────────────────────────
# false = each player gets their own private instance (solo)
# true  = multiple players can join the same generated instance simultaneously
shared: false

# ── Seed ─────────────────────────────────────────────────────────────────────
# Remove this line (or set to ~) for a random seed every run.
# Set a number to always generate the same layout.
# seed: 123456789

# ── Leaderboard ───────────────────────────────────────────────────────────────
# All generated runs are tracked under this shared course ID for leaderboards.
# Override here to have a separate board for this template.
leaderboard-course-id: "__generated__"

# ── Difficulty overrides (optional) ──────────────────────────────────────────
# Uncomment any field to override the difficulty defaults for this template only.
# difficulty-overrides:
#   min-gap: 3
#   max-gap: 5
#   min-height-delta: -1
#   max-height-delta: 2
#   platform-min-size: 1
#   platform-max-size: 2
#   obstacle-chance: 0.25   # probability 0.0 – 1.0
#   modifier-chance: 0.05   # probability 0.0 – 1.0

# ── Modifier overrides (optional) ────────────────────────────────────────────
# Maps specific block materials to built-in modifier behaviours.
# Uncomment and adjust as needed.
# modifiers:
#   - block: SLIME_BLOCK
#     type: jump_pad
#   - block: HONEY_BLOCK
#     type: boost
#   - block: MAGMA_BLOCK
#     type: kill_block
